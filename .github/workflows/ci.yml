name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Calidad (typecheck, lint, format, test, build)
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build

  security:
    name: Seguridad (audit + anti-PII)
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high --omit=dev
      - run: npm run check:pii

  no-ai-coauthor:
    name: Sin co-autoría de IA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rechazar co-autoría o atribución de IA en los commits
        run: |
          if git log --format='%B' \
            | grep -iE 'co-authored-by:.*(claude|anthropic)|generated with.*claude'; then
            echo "::error::Se detectó co-autoría o atribución de IA en los mensajes de commit."
            exit 1
          fi
          echo "OK: ningún commit atribuye autoría a una IA."
